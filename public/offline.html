<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextArea - Sem Conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; color: #1e293b; }
    .container { text-align: center; padding: 2rem; }
    .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; background: #2563EB; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
    .icon span { color: white; font-size: 28px; font-weight: 700; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
    button { background: #2563EB; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><span>T</span></div>
    <h1>Sem conexão</h1>
    <p>Verifique sua internet e tente novamente</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
